<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Size Chart</title>

  <style>

    body{
      font-family: Arial, Helvetica, sans-serif;
      background:#f2f2f2;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    table{
      border-collapse:collapse;
      width:700px;
      text-align:center;
      font-size:22px;
    }

    th, td{
      border:2px solid #555;
      padding:12px;
    }

    /* Header Row */
    th{
      background-color:#c0504d;
      color:white;
    }

    /* Waist Row */
    .waist{
      background-color:#d99694;
      color:white;
    }

    /* Chest Row */
    .chest{
      background-color:#f2dcdb;
      color:black;
    }

    /* Sleeve Row */
    .sleeve{
      background-color:#ffffff;
      color:black;
    }

    /* First Column Alignment */
    td:first-child,
    th:first-child{
      text-align:left;
      padding-left:15px;
    }

  </style>
</head>
<body>

  <table>

    <tr>
      <th>Part</th>
      <th>XS</th>
      <th>S</th>
      <th>M</th>
      <th>L</th>
      <th>XL</th>
    </tr>

    <tr class="waist">
      <td>Waist</td>
      <td>25</td>
      <td>28</td>
      <td>30</td>
      <td>31</td>
      <td>32</td>
    </tr>

    <tr class="chest">
      <td>Chest</td>
      <td>34</td>
      <td>34</td>
      <td>38</td>
      <td>40</td>
      <td>41</td>
    </tr>

    <tr class="sleeve">
      <td>Sleeve</td>
      <td>23</td>
      <td>24</td>
      <td>24</td>
      <td>25</td>
      <td>25</td>
    </tr>

  </table>

</body>
</html>
